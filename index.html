<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEKİROMEN | ROTA 10 NİSAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Anton&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Yüksek Kontrastlı Renk Paleti */
        :root {
            --bg-danger: #000000; /* Zifiri Siyah */
            --bg-brutal: #0a0a0a; /* Hafif Açık Siyah (Duvar Dokusu İçin) */
            --text-pure: #ffffff;
            --accent-raw: #ff0000; /* Saf, Çiğ Kırmızı */
            --spotify-green: #1DB954;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: auto; /* Hard rapte yumuşak kaydırma olmaz */
        }

        body {
            background-color: var(--bg-danger);
            color: var(--text-pure);
            font-family: 'Barlow Condensed', sans-serif;
            overflow-x: hidden;
            letter-spacing: -0.5px;
        }

        /* Endüstriyel Kaydırma Çubuğu */
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: var(--bg-danger); }
        ::-webkit-scrollbar-thumb { background: var(--accent-raw); border: 2px solid var(--bg-danger); }

        /* Deli Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 3%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: var(--bg-danger);
            border-bottom: 4px solid var(--accent-raw);
        }

        .logo {
            font-family: 'Anton', sans-serif;
            font-size: 2rem;
            letter-spacing: 1px;
            text-decoration: none;
            color: var(--text-pure);
            text-transform: uppercase;
        }

        .logo span { color: var(--accent-raw); font-family: 'Permanent Marker', cursive; }

        .nav-links a {
            color: var(--text-pure);
            text-decoration: none;
            margin-left: 20px;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s ease;
        }

        .nav-links a:hover { color: var(--accent-raw); text-decoration: line-through; }

        /* Geri Sayım (ROTA YIKIM) */
        .hero {
            height: 110vh; /* Devasa hissetmek için */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: url('https://www.transparenttextures.com/patterns/dark-concrete.png'), var(--bg-danger);
            text-align: center;
            padding-top: 100px;
        }

        .rota-warning {
            font-family: 'Permanent Marker', cursive;
            color: var(--accent-raw);
            font-size: 1.5rem;
            text-transform: uppercase;
            transform: rotate(-5deg);
            margin-bottom: 20px;
        }

        .hero-title {
            font-family: 'Anton', sans-serif;
            font-size: 18vw; /* İnanılmaz Devasa */
            line-height: 0.8;
            letter-spacing: -10px;
            margin-bottom: 20px;
            color: var(--text-pure);
            -webkit-text-stroke: 4px var(--accent-raw); /* Brütal Kenarlık */
            paint-order: stroke fill;
        }

        .countdown {
            display: flex;
            gap: 15px;
            margin-bottom: 60px;
            background: rgba(255,0,0,0.1);
            padding: 20px 40px;
            border: 2px dashed var(--accent-raw);
        }

        .cd-item span {
            display: block;
            font-family: 'Anton', sans-serif;
            font-size: 5rem;
            color: var(--accent-raw);
            line-height: 1;
        }

        .cd-item label {
            font-size: 0.8rem;
            color: var(--text-pure);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 900;
        }

        /* Agresif Butonlar */
        .btn-brutal {
            padding: 20px 50px;
            background-color: var(--accent-raw);
            color: var(--text-pure);
            text-decoration: none;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 0; /* Yuvarlak köşeye hayır */
            transition: all 0.2s ease;
            font-size: 1.1rem;
            border: 4px solid var(--accent-raw);
        }

        .btn-brutal:hover {
            background-color: transparent;
            color: var(--accent-raw);
            transform: scale(1.1);
        }

        /* Yayında (Gitmek mi zor? - Ham Alan) */
        .active-track {
            padding: 150px 5%;
            background-color: var(--bg-brutal);
            border-top: 10px solid var(--accent-raw);
            border-bottom: 10px solid var(--accent-raw);
        }

        .track-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
        }

        .track-info-hard h2 {
            font-family: 'Anton', sans-serif;
            font-size: 6rem;
            margin-bottom: 20px;
            line-height: 0.9;
            color: var(--text-pure);
        }

        .track-info-hard h2 span { color: var(--accent-raw); }

        .track-info-hard p {
            color: var(--text-pure);
            margin-bottom: 50px;
            max-width: 600px;
            line-height: 1.4;
            font-size: 1.1rem;
            font-weight: 400;
        }

        .btn-spotify-hard {
            background-color: var(--spotify-green);
            color: #000;
            border-radius: 50px;
        }

        .track-visual-hard {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1/1;
            background-color: #1a1a1a; /* Resim yüklenene kadar siyah dursun */
            border: 10px solid var(--text-pure); /* Brütal Kenarlık */
            outline: 10px solid var(--accent-raw);
            margin: 0 auto;
        }

        /* Külliyat (High-Contrast Grid) */
        .catalog-hard {
            padding: 100px 3%;
            background-color: var(--bg-danger);
        }

        .catalog-hard h2 {
            font-family: 'Anton', sans-serif;
            font-size: 4rem;
            letter-spacing: 1px;
            margin-bottom: 80px;
            text-align: center;
            text-transform: uppercase;
        }

        .catalog-grid-hard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .catalog-item-hard {
            border: 4px solid var(--bg-brutal);
            padding: 15px;
            transition: all 0.2s ease;
        }

        .catalog-item-hard:hover {
            border-color: var(--accent-raw);
            transform: translateY(-5px);
        }

        .catalog-cover-hard {
            width: 50%;
            aspect-ratio: 1/1;
            background-color: #1a1a1a;
            margin-bottom: 15px;
        }

        .catalog-item-hard h4 {
            font-size: 1.4rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .catalog-item-hard span {
            font-size: 0.9rem;
            color: var(--accent-raw);
            font-weight: 700;
        }

        /* === Spotify Embed (En Altta) === */
        .spotify-embed-section {
            padding: 80px 3%;
            background-color: var(--bg-brutal);
            border-top: 4px solid var(--accent-raw);
            text-align: center;
        }

        .spotify-embed-section h2 {
            font-family: 'Permanent Marker', cursive;
            font-size: 2rem;
            margin-bottom: 40px;
            color: var(--text-pure);
            transform: rotate(-2deg);
        }

        .spotify-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        footer {
            padding: 20px;
            text-align: center;
            background-color: var(--bg-danger);
            color: #444;
            font-size: 0.8rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* Responsive */
        @media (max-width: 1000px) {
            .track-grid { grid-template-columns: 1fr; text-align: center; }
            .track-info-hard h2 { font-size: 4rem; }
            .track-info-hard p { margin: 0 auto 40px auto; }
            .hero-title { font-size: 25vw; letter-spacing: -5px; }
            .cd-item span { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">BEKİR<span>OMEN</span></a>
        <nav class="nav-links">
            <a href="#rota">ROTA</a>
            <a href="#active">YAYINDA</a>
            <a href="#catalog">PARÇALAR</a>
        </nav>
    </header>

    <section class="hero" id="rota">
        <div class="rota-warning">Gerı Sayım Basladı</div>
        <h1 class="hero-title">ROTA</h1>
        
        <div class="countdown">
            <div class="cd-item">
                <span id="days">00</span>
                <label>Gün</label>
            </div>
            <div class="cd-item">
                <span id="hours">00</span>
                <label>Saat</label>
            </div>
            <div class="cd-item">
                <span id="minutes">00</span>
                <label>Dk</label>
            </div>
            <div class="cd-item">
                <span id="seconds">00</span>
                <label>Sn</label>
            </div>
        </div>

        <a href="#" class="btn-brutal">Pre-Save // Kaydet</a>
    </section>

    <section class="active-track" id="active">
        <div class="track-grid">
            <div class="track-info-hard">
                <h2>Şu An <span>Yayında</span></h2>
                <p>Yeni single "Gitmek mi zor?" Tüm Dijital Platformlarda Yayında.</p>
                <a href="https://open.spotify.com/intl-tr/album/1C6HSIjcAwq9M5g21n09dS?si=B5HpGAYGQS-ASmN0q0idag" class="btn-brutal btn-spotify-hard">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; margin-right: 10px;"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.492 17.31c-.171.284-.543.376-.827.204-2.273-1.39-5.132-1.705-8.502-.936-.324.074-.648-.13-.723-.454-.074-.323.13-.647.454-.722 3.676-.84 6.848-.485 9.398 1.077.284.17.376.543.205.827s0 0 0 0zm1.465-3.268c-.215.352-.676.465-1.028.25-2.6-1.597-6.56-2.062-9.632-1.127-.396.12-.812-.102-.933-.497-.12-.397.102-.813.497-.933 3.518-1.068 7.892-.556 10.846 1.258.352.215.465.676.25 1.028v.021zm.14-3.411c-.26.425-.815.565-1.24.305-3.118-1.851-8.272-2.022-11.26-1.116-.48.145-.985-.125-1.13-.605-.145-.48.125-.985.605-1.13 3.54-1.073 9.223-.873 12.83 1.268.425.26.565.815.305 1.24v.038z"/></svg>
                    Spotify'da Patlat
                </a>
            </div>
            
            <div class="track-visual-hard" style="background-image: url('img/gitmek.png'); background-size: cover; background-position: center;"></div>
        </div>
    </section>

    <section class="catalog-hard" id="catalog">
        <h2>PARÇALAR</h2>
        <div class="catalog-grid-hard">

            <div class="catalog-item-hard">
                <div class="catalog-cover-hard" style="background-image: url('img/ROTA\ KAPAK.png'); background-size: cover; background-position: center;"></div>
                <h4>ROTA</h4>
                <span>Single // 2026</span>
            </div>
            
            <div class="catalog-item-hard">
                <div class="catalog-cover-hard" style="background-image: url('img/gitmek.png'); background-size: cover; background-position: center;"></div>
                <h4>Gitmek Mi Zor?</h4>
                <span>Single // 2026</span>
            </div>

        </div>
    </section>

    <section class="spotify-embed-section">
        <h2>BEKIROMEN - SPOTİFY</h2>
        <div class="spotify-container">
            <iframe style="border-radius:0px" src="https://open.spotify.com/embed/artist/0Ref6YvhOfK1HIS8ixFOcH?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
    </section>

    <footer>
        © 2026 BEKİROMEN
    </footer>

    <script>
        // ROTA YIKIM Geri Sayımı (10 Nisan 2026)
        const rotaRelease = new Date("April 10, 2026 00:00:00").getTime();

        const timer = setInterval(() => {
            const now = new Date().getTime();
            const distance = rotaRelease - now;

            if (distance < 0) {
                clearInterval(timer);
                document.querySelector(".countdown").innerHTML = "<h2 style='font-family: Anton; font-size: 5rem; color: var(--accent-raw);'>YIKIM BAŞLADI</h2>";
                return;
            }

            document.getElementById("days").innerText = String(Math.floor(distance / (1000 * 60 * 60 * 24))).padStart(2, '0');
            document.getElementById("hours").innerText = String(Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
            document.getElementById("minutes").innerText = String(Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
            document.getElementById("seconds").innerText = String(Math.floor((distance % (1000 * 60)) / 1000)).padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
